<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Clientes')"></head>
<body>
    <nav th:replace="fragments/header :: navbar"></nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1>Clientes</h1>
                <p class="text-muted">Gestiona los clientes registrados en el sistema.</p>
            </div>
            <a class="btn btn-primary" th:href="@{/admin/clientes/nuevo}">Nuevo Cliente</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>RUC</th>
                        <th>Razón Social</th>
                        <th>Rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cliente : ${clientes}">
                        <td th:text="${cliente.id}">1</td>
                        <td th:text="${cliente.nombreCompleto}">Nombre Completo</td>
                        <td th:text="${cliente.email}">email@example.com</td>
                        <td th:text="${cliente.telefono}">999999999</td>
                        <td th:text="${cliente.ruc != null ? cliente.ruc.valor : '-'}">-</td>
                        <td th:text="${cliente.razonSocial != null ? cliente.razonSocial.valor : '-'}">-</td>
                        <td th:text="${cliente.rol != null ? cliente.rol.name() : 'CLIENTE'}">CLIENTE</td>
                        <td>
                            <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/clientes/{id}/editar(id=${cliente.id})}">Editar</a>
                            <a class="btn btn-sm btn-outline-info ms-1" th:href="@{/admin/clientes/{id}/direcciones(id=${cliente.id})}">Direcciones</a>
                            <form th:action="@{/admin/clientes/{id}/eliminar(id=${cliente.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${clientes.size()} == 0">
                        <td colspan="8" class="text-center">No se encontraron clientes.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
