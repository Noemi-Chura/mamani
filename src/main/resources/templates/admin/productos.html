<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Productos')"></head>
<body>
    <nav th:replace="fragments/header :: navbar"></nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1>Productos</h1>
                <p class="text-muted">Administra los productos disponibles en la tienda.</p>
            </div>
            <a class="btn btn-primary" th:href="@{/admin/gestionProductos/nuevo}">Nuevo Producto</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock Mín.</th>
                        <th>Disponible</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="producto : ${productos}">
                        <td>
                            <img th:if="${producto.imagenUrl != null and producto.imagenUrl != ''}" th:src="${producto.imagenUrl}" alt="Producto" style="max-width: 50px; max-height: 50px;">
                            <span th:if="${producto.imagenUrl == null or producto.imagenUrl == ''}">-</span>
                        </td>
                        <td th:text="${producto.nombre}">Pan</td>
                        <td th:text="${producto.categoria}">PAN</td>
                        <td th:text="${#numbers.formatCurrency(producto.precio)}">3.50</td>
                        <td th:text="${producto.stock}">50</td>
                        <td>
                            <span th:if="${producto.disponible}" class="badge bg-success">Disponible</span>
                            <span th:if="!${producto.disponible}" class="badge bg-danger">No disponible</span>
                        </td>
                        <td>
                            <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/gestionProductos/{id}/editar(id=${producto.id})}">Editar</a>
                            <form th:action="@{/admin/gestionProductos/{id}/eliminar(id=${producto.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${productos.size()} == 0">
                        <td colspan="7" class="text-center">No hay productos registrados.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
