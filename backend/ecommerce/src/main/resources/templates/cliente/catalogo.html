<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="fragments/header :: head('Catálogo')"></head>
<body>
    <nav th:replace="fragments/header :: navbar"></nav>

    <div class="container mt-4">
        <h1>Catálogo de Productos</h1>

        <div class="row">
            <div class="col-md-3">
                <h5>Categorías</h5>
                <ul class="list-group">
                    <li class="list-group-item">
                        <a href="#" th:href="@{/productos}">Todas</a>
                    </li>
                    <li class="list-group-item" th:each="cat : ${categorias}">
                        <a href="#" th:href="@{/productos(categoria=${cat})}" th:text="${cat}">Categoría</a>
                    </li>
                </ul>
            </div>
            <div class="col-md-9">
                <div class="row">
                    <div class="col-md-4 mb-4" th:each="producto : ${productos}">
                        <div class="card h-100">
                            <img th:src="${producto.imagenUrl}" class="card-img-top" alt="Producto">
                            <div class="card-body">
                                <h5 class="card-title" th:text="${producto.nombre}">Nombre</h5>
                                <p class="card-text" th:text="${producto.descripcion}">Descripción</p>
                                <p class="card-text">S/ <span th:text="${producto.precio.valor}">Precio</span></p>
                                <p class="card-text">Stock: <span th:text="${producto.stock.cantidad}">Stock</span></p>
                                <button class="btn btn-primary agregar-carrito" th:data-producto-id="${producto.id}">Agregar al Carrito</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
