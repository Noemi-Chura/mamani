<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Producto')"></head>
<body>
    <nav th:replace="fragments/header :: navbar"></nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h3 th:text="${producto != null ? 'Editar Producto' : 'Nuevo Producto'}">Producto</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="${producto != null ? '/admin/gestionProductos/' + producto.id : '/admin/gestionProductos'}" method="post" enctype="multipart/form-data">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="nombre" name="nombre" th:value="${producto != null ? producto.nombre : ''}" required>
                            </div>
                            <div class="mb-3">
                                <label for="descripcion" class="form-label">Descripción</label>
                                <textarea class="form-control" id="descripcion" name="descripcion" rows="3" required th:text="${producto != null ? producto.descripcion : ''}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="categoria" class="form-label">Categoría</label>
                                <select class="form-select" id="categoria" name="categoriaId" required>
                                    <option value="">Seleccione una categoría</option>
                                    <option th:each="categoria : ${categorias}"
                                            th:value="${categoria.id}"
                                            th:text="${categoria.nombre}"
                                            th:selected="${producto != null && categoria.id == producto.categoria.id}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="precio" class="form-label">Precio</label>
                                <input type="number" step="0.01" class="form-control" id="precio" name="precio" th:value="${producto != null ? producto.precio.valor : ''}" required>
                            </div>
                            <div class="mb-3">
                                <label for="stock" class="form-label">Stock</label>
                                <input type="number" class="form-control" id="stock" name="stock" th:value="${producto != null ? producto.stock.cantidad : ''}" required>
                            </div>
                            <div class="mb-3">
                                <label for="disponible" class="form-label">Disponibilidad</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="disponible" name="disponible" 
                                           th:checked="${producto != null ? producto.disponible : false}">
                                    <label class="form-check-label" for="disponible">
                                        Disponible para venta
                                    </label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="imagen" class="form-label">Imagen del Producto</label>
                                <input type="file" class="form-control" id="imagen" name="imagen" accept="image/*">
                                <div class="mt-2">
                                    <small class="form-text text-muted">Preview:</small>
                                    <img id="imagenPreview" th:if="${producto == null or producto.imagenUrl == null or producto.imagenUrl == ''}" alt="Preview" class="img-fluid rounded" style="max-width: 200px; max-height: 200px; display:none;" />
                                    <img th:if="${producto != null and producto.imagenUrl != null and producto.imagenUrl != ''}" th:src="${producto.imagenUrl}" alt="Imagen actual" class="img-fluid rounded" style="max-width: 200px; max-height: 200px;" />
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                            <a class="btn btn-secondary" th:href="@{/admin/gestionProductos}">Cancelar</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="fragments/footer :: footer"></footer>
    <script>
        (function(){
            const input = document.getElementById('imagen');
            const preview = document.getElementById('imagenPreview');
            if (!input) return;
            input.addEventListener('change', function(e){
                const file = input.files && input.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                if (preview) {
                    preview.src = url;
                    preview.style.display = 'block';
                }
            });
        })();
    </script>
</body>
</html>
