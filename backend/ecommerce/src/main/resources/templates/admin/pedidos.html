<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Gestión de Pedidos')"></head>
<body>
    <nav th:replace="fragments/header :: navbar"></nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1"><i class="fas fa-receipt me-2"></i>Gestión de Pedidos</h2>
                <p class="text-muted mb-0">Filtra pedidos por fecha de entrega y estado.</p>
            </div>
            <a class="btn btn-outline-secondary" th:href="@{/admin}">Volver al Dashboard</a>
        </div>

        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <form th:action="@{/admin/pedidos}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Fecha de Entrega</label>
                        <input type="date" name="fecha" class="form-control" th:value="${fecha}" />
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Estado</label>
                        <select name="estado" class="form-select">
                            <option value="" th:selected="${estado == null || estado == ''}">Todos</option>
                            <option value="PENDIENTE_PAGO" th:selected="${estado == 'PENDIENTE_PAGO'}">Pendiente Pago</option>
                            <option value="PAGADO" th:selected="${estado == 'PAGADO'}">Pagado / Confirmado</option>
                            <option value="EN_PREPARACION" th:selected="${estado == 'EN_PREPARACION'}">En Producción</option>
                            <option value="LISTO_PARA_RECOJO" th:selected="${estado == 'LISTO_PARA_RECOJO'}">Listo para Recojo</option>
                            <option value="EN_CAMINO" th:selected="${estado == 'EN_CAMINO'}">En Camino (Delivery)</option>
                            <option value="ENTREGADO" th:selected="${estado == 'ENTREGADO'}">Entregado</option>
                            <option value="CANCELADO" th:selected="${estado == 'CANCELADO'}">Cancelado</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Filtrar</button>
                    </div>
                    <div class="col-md-2">
                        <a class="btn btn-outline-secondary w-100" th:href="@{/admin/pedidos}">Limpiar</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle shadow-sm bg-white rounded">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Entrega</th>
                        <th>Total</th>
                        <th>Tipo de Entrega</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${pedidos == null or #lists.isEmpty(pedidos)}">
                        <td colspan="6" class="text-center py-4">No se encontraron pedidos.</td>
                    </tr>
                    <tr th:each="pedido : ${pedidos}">
                        <td class="fw-bold" th:text="${pedido.id}">#000001</td>
                        <td>
                            <div class="fw-bold" th:text="${pedido.clienteNombreCompleto}">Cliente Nombre</div>
                            <div class="text-muted small" th:text="${pedido.clienteEmail}">cliente@example.com</div>
                        </td>
                        <td>
                            <span th:text="${pedido.fechaEntrega}">2025-05-01</span>
                        </td>
                        <td class="fw-bold text-success">
                            <div class="d-flex align-items-center gap-2">
                                <span th:text="${pedido.total}">S/ 0.00</span>
                            </div>
                        </td>
                        <td>
                            <span class="badge bg-info text-dark" th:text="${pedido.tipoEntrega}">DOMICILIO</span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${pedido.estado == 'PENDIENTE_PAGO' ? ' bg-warning text-dark' : pedido.estado == 'PAGADO' ? ' bg-info text-dark' : pedido.estado == 'EN_PREPARACION' ? ' bg-primary' : pedido.estado == 'LISTO_PARA_RECOJO' ? ' bg-secondary' : pedido.estado == 'EN_CAMINO' ? ' bg-dark' : pedido.estado == 'ENTREGADO' ? ' bg-success' : pedido.estado == 'CANCELADO' ? ' bg-danger' : ''}"
                                  th:text="${pedido.estado}">PENDIENTE_PAGO</span>
                        </td>
                        <td>
                            <div class="btn-group btn-group-sm" role="group" aria-label="Acciones pedido">
                                <a class="btn btn-outline-primary" th:href="@{/admin/detallePedido/{id}(id=${pedido.id})}" title="Ver Detalles">
                                    <i class="fas fa-eye me-1"></i>Ver
                                </a>
                                <button type="button" class="btn btn-outline-dark btn-estado"
                                        th:data-pedido-id="${pedido.id}"
                                        th:data-pedido-estado="${pedido.estado}"
                                        title="Cambiar Estado">
                                    <i class="fas fa-sync-alt me-1"></i>Estado
                                </button>
                                <a class="btn btn-outline-danger" th:href="@{/admin/eliminarPedido/{id}(id=${pedido.id})}"
                                   onclick="return confirm('¿Estás seguro de eliminar este pedido? Esta acción no se puede deshacer.')"
                                   title="Eliminar Pedido">
                                    <i class="fas fa-trash me-1"></i>Eliminar
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="modalEstado" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Actualizar Estado</h5>
                <button type="button" class="btn-close" onclick="cerrarModal()"></button>
            </div>
            <form th:action="@{/admin/cambiarEstadoPedido}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="modal-body">
                    <input type="hidden" name="id_pedido" id="modal_id_pedido" />
                    <label class="form-label">Nuevo Estado:</label>
                    <select name="estado" id="modal_select_estado" class="form-select">
                        <option value="PENDIENTE_PAGO">PENDIENTE DE PAGO</option>
                        <option value="PAGADO">PAGADO / CONFIRMADO</option>
                        <option value="EN_PREPARACION">EN PRODUCCIÓN</option>
                        <option value="LISTO_PARA_RECOJO">LISTO PARA RECOJO</option>
                        <option value="EN_CAMINO">EN CAMINO (Delivery)</option>
                        <option value="ENTREGADO">ENTREGADO (Finalizado)</option>
                        <option value="CANCELADO">CANCELADO</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="cerrarModal()">Cerrar</button>
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
    
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1050;
        }
        
        .modal-content {
            background-color: white;
            border-radius: 0.375rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
        }
        
        .modal-header {
            padding: 1rem;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h5 {
            margin: 0;
        }
        
        .btn-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 1.5rem;
            height: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-close::before {
            content: "×";
        }
        
        .modal-body {
            padding: 1rem;
            flex-grow: 1;
        }
        
        .modal-footer {
            padding: 1rem;
            border-top: 1px solid #dee2e6;
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }
    </style>

    <script>
        function abrirModal(pedidoId, pedidoEstado) {
            document.getElementById('modal_id_pedido').value = pedidoId;
            document.getElementById('modal_select_estado').value = pedidoEstado;
            document.getElementById('modalEstado').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modalEstado').style.display = 'none';
        }

        // Cerrar modal al hacer click fuera del contenido
        document.addEventListener('click', function(e) {
            var modal = document.getElementById('modalEstado');
            if (e.target === modal) {
                cerrarModal();
            }
        });

        // Event listeners para botones
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.btn-estado').forEach(function (button) {
                button.addEventListener('click', function () {
                    var pedidoId = this.getAttribute('data-pedido-id');
                    var pedidoEstado = this.getAttribute('data-pedido-estado');
                    abrirModal(pedidoId, pedidoEstado);
                });
            });
        });
    </script>

    <footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
